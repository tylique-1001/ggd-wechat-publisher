name: Keep Repository Alive

on:
  schedule:
    # 工作日每2小时跑一次（高频触发，总有能跑的）
    # GitHub Actions cron可能延迟但不会永久跳过，高频+去重保证推送
    - cron: "30 */2 * * 1-5"

jobs:
  ensure-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python 和依赖
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install openai pillow

      - name: 如果是推送日且未推送，执行推送
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WEIXIN_APPID: ${{ secrets.WEIXIN_APPID }}
          WEIXIN_SECRET: ${{ secrets.WEIXIN_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 周一到周五(1-5)推送，周末跳过
          WEEKDAY=$(date +%u)
          if [ "$WEEKDAY" -gt 5 ]; then
            echo "今天是周末，跳过"
            exit 0
          fi
          echo "工作日，尝试推送（脚本自带去重，已推送自动跳过）"
          python scripts/cloud_daily_publish.py --date "$(date +%Y-%m-%d)" || echo "推送失败或已去重跳过"

      - name: 更新心跳
        run: |
          date -u '+%Y-%m-%dT%H:%M:%SZ' > .heartbeat
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .heartbeat
          git commit -m "chore: heartbeat update" || echo "无需更新"
          git push
