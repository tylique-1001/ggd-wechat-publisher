name: 每日推送

on:
  schedule:
    # GitHub Actions cron 高峰期延迟严重，密集投放提高命中率
    # 去重逻辑保证只推一次，多触发的自动跳过
    # UTC 23:00 = 北京 7:00（前一天，0-4=周日到周四对应北京周一到周五）
    - cron: '0 23 * * 0-4'
    # UTC 0:00-3:00 = 北京 8:00-11:00，每30分钟一次
    - cron: '0 0 * * 1-5'
    - cron: '30 0 * * 1-5'
    - cron: '0 1 * * 1-5'
    - cron: '30 1 * * 1-5'
    - cron: '0 2 * * 1-5'
    - cron: '30 2 * * 1-5'
    - cron: '0 3 * * 1-5'
    # 兜底
    - cron: '0 4 * * 1-5'
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install openai pillow requests

      - name: 生成并推送文章
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          WEIXIN_APPID: ${{ secrets.WEIXIN_APPID }}
          WEIXIN_SECRET: ${{ secrets.WEIXIN_SECRET }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/cloud_daily_publish.py --date "$(date +%Y-%m-%d)"
