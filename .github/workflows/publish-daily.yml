name: 公众号推送

on:
  schedule:
    # 对齐定制方案：周二/周四发布
    # 去重逻辑保证只推一次，多触发的自动跳过
    # UTC 23:00 前一天 = 北京 7:00
    - cron: '0 23 * * 1,3'
    # UTC 0:30-2:00 = 北京 8:30-10:00
    - cron: '30 0 * * 2,4'
    - cron: '0 1 * * 2,4'
    - cron: '30 1 * * 2,4'
    - cron: '0 2 * * 2,4'
  workflow_dispatch:
    inputs:
      force:
        description: '强制推送（忽略去重）'
        required: false
        default: 'false'
      pillar:
        description: '内容支柱（留空=按日期自动）'
        type: choice
        options:
          - ''
          - competitor
          - methodology
          - monthly_report
          - customer_story
      track:
        description: '赛道（仅竞品拆解台有效）'
        type: choice
        options:
          - ''
          - game
          - tool
          - drama

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install openai pillow

      - name: 生成并推送文章
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          WEIXIN_APPID: ${{ secrets.WEIXIN_APPID }}
          WEIXIN_SECRET: ${{ secrets.WEIXIN_SECRET }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--date $(date +%Y-%m-%d)"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ -n "${{ github.event.inputs.pillar }}" ]; then
            ARGS="$ARGS --pillar ${{ github.event.inputs.pillar }}"
          fi
          if [ -n "${{ github.event.inputs.track }}" ]; then
            ARGS="$ARGS --track ${{ github.event.inputs.track }}"
          fi
          python scripts/cloud_daily_publish.py $ARGS
